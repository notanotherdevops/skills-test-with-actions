
name: testing secrets
on:
  push:
    branches: main

jobs:
   example-job:
      runs-on: ubuntu-latest
      steps:
         # Passo 1: Lê as secrets, limpa chaves inválidas/sistema e exporta como string multilinhas
         - name: Prepare Clean Secrets
           id: prepare_secrets
           env:
             RAW_SECRETS: ${{ toJSON(secrets) }}
           run: |
             # Usa o jq para filtrar o github_token, chaves com *** e formatar como KEY=value
             CLEAN_SECRETS=$(jq -n -r '
               env.RAW_SECRETS | fromjson | 
               to_entries | 
               map(select(.key | test("github|azure"; "i") | not)) |
               map(select(.key | test("^[-._a-zA-Z][-._a-zA-Z0-9]*$"))) |
               map(select(.value != null and .value != "")) |
               map("\(.key)=\(.value)") | 
               join("\n")
             ')
             
             # Como o resultado tem múltiplas linhas, usamos um delimitador (EOF) 
             # para injetar com segurança no GITHUB_OUTPUT
             EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
             echo "clean_secrets<<$EOF" >> $GITHUB_OUTPUT
             echo "$CLEAN_SECRETS" >> $GITHUB_OUTPUT
             echo "$EOF" >> $GITHUB_OUTPUT
